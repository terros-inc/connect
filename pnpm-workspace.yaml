packages:
  - sdk
  - cli
  - integrations/*
blockExoticSubdeps: true
catalogMode: strict
cleanupUnusedCatalogs: true
minimumReleaseAge: 10080
packageManagerStrictVersion: true
trustPolicy: no-downgrade
updateNotifier: false
verifyDepsBeforeRun: warn
catalog:
  "@types/luxon": ^3.7.1
  "@types/minimist": ^1.2.5
  '@types/node': ^24.13.2
  esbuild: ^0.28.1
  luxon: ^3.7.2
  minimist: ^1.2.8
  open: ^11.0.0
  oxfmt: ^0.57.0
  oxlint: ^1.72.0
  tsdown: ^0.22.3
  typescript: ^6.0.3
  vitest: ^4.1.10
  yaml: ^2.9.0
allowBuilds:
  esbuild: true
